# Domain-specific configuration for dermatology image datasets

dataset_info:
  name: "dermatology"
  description: "Dermatology image classification datasets"
  target_column: "skin_cancer"
  target_type: "binary"
  positive_class: 1

datasets:
  pad_ufes_20:
    source: "PAD-UFES-20"
    path: "data/raw/dermatology/pad_ufes_20_standardized.csv"
    n_samples: 2298
    image_column: "image_path"
  scin:
    source: "SCIN"
    path: "data/raw/dermatology/scin_standardized.csv"
    image_column: "image_path"
    # Profiling-only: schema-generalization + fairness profiling dataset.
    # skin_cancer target is an approximate top-1 weighted-label mapping, not a
    # training label. age_group is SCIN-native (different buckets than PAD).

sensitive_attributes:
  age_group:
    type: "categorical"
    description: "Age group bins"
    categories: ["<20", "20-39", "40-59", "60-79", "80+", "unknown"]

  sex:
    type: "categorical"
    description: "Sex mapped from PAD gender"
    categories: [0, 1, -1]

  fitzpatrick_group:
    type: "categorical"
    description: "Grouped Fitzpatrick skin type"
    categories: ["I-II", "III-IV", "V-VI", "unknown"]

sensitive_attribute_order:
  - age_group
  - sex
  - fitzpatrick_group

target_mapping:
  skin_cancer_positive:
    - BCC
    - SCC
    - MEL
  skin_cancer_negative:
    - ACK
    - NEV
    - SEK

fairness_context:
  protected_groups:
    - age_group
    - sex
    - fitzpatrick_group
  clinical_relevance:
    critical_metrics:
      - recall
      - calibration
    acceptable_tradeoffs:
      precision: "Secondary to sensitivity for malignant-lesion screening baseline"
