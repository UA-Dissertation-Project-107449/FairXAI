# Domain-specific configuration for cardiac disease datasets

dataset_info:
  name: "cardiac"
  description: "Cardiac disease prediction datasets"
  target_column: "heart_disease"
  target_type: "binary"
  positive_class: 1

datasets:
  cleveland:
    source: "UCI Heart Disease Cleveland"
    path: "data/raw/cardiac/cleveland_standardized.csv"
    n_samples: 297  # After preprocessing
    n_features: 13
    
  kaggle_heart:
    source: "Kaggle Heart Disease Dataset"
    path: "data/raw/cardiac/kaggle_heart_standardized.csv"
    n_samples: 918  # After preprocessing
    n_features: 11

  cardio70k:
    source: "Cardiovascular Disease Dataset (70k)"
    path: "data/raw/cardiac/cardio70k_standardized.csv"
    n_samples: 70000
    n_features: 12
    age_unit: "days"  # ages stored in days, not years

sensitive_attributes:
  age_group:
    type: "categorical"
    description: "Age group bins"
    categories: ["<40", "40-49", "50-59", "60-69", "70+"]
    
  sex:
    type: "binary"
    description: "Biological sex"
    categories: ["female", "male"]

  ethnicity:
    type: "categorical"
    description: "Ethnicity (optional, not present in current cardiac datasets)"

  group_cluster:
    type: "categorical"
    description: "Derived cluster/similarity group (optional)"

# Canonical ordered list used for stratification and reporting.
# Matches configs/pipelines/cardiac.yaml → fairness.sensitive_attributes.
sensitive_attribute_order:
  - age_group
  - sex
  - ethnicity
  - group_cluster

# ── Schema harmonization constants ────────────────────────────────────
# Upper-bound clipping applied during age normalization.
age_clipping:
  years_upper: 120        # human-range upper bound for age in years
  cardio70k_days_upper: 43830  # ~120 years in days

# Canonical sex-value mappings applied during schema harmonization.
# Used by schemas.py, loaders.py, and notebook_utils.
sex_mapping:
  numeric:
    0: "Female"
    1: "Male"
    2: "Male"         # some datasets encode 2 as Male
  string:
    "F": "Female"
    "Female": "Female"
    "0": "Female"
    "M": "Male"
    "Male": "Male"
    "1": "Male"
    "2": "Male"

feature_groups:
  demographic:
    - age
    - sex
    
  clinical_measurements:
    - trestbps  # resting blood pressure
    - chol      # serum cholesterol
    - thalach   # max heart rate
    - oldpeak   # ST depression
    
  diagnostic_tests:
    - fbs       # fasting blood sugar
    - restecg   # resting ECG results
    - exang     # exercise induced angina
    - slope     # slope of peak exercise ST segment
    - ca        # number of major vessels
    - thal      # thalassemia

fairness_context:
  protected_groups:
    - age_group
    - sex

  known_biases:
    - "Age groups 60+ are overrepresented in positive class"
    - "Males have higher disease prevalence in Cleveland dataset"
    - "Females underrepresented in both datasets (historical bias)"

  clinical_relevance:
    critical_metrics:
      - recall  # Minimize false negatives (missing actual disease)
      - calibration  # Probability estimates must be reliable

    acceptable_tradeoffs:
      precision: "Can tolerate some false positives for safety"
      specificity: "Secondary to sensitivity in healthcare context"

# ── Clinical validity constraints ─────────────────────────────────────
# Applied during preprocessing, after age normalization, before binning.
# Keys are canonical feature names; code resolves them to raw column names via
# _CONSTRAINT_ALIASES in preprocess_data.py.
# default_action: drop  -- remove violating rows (safe for training; log count)
# default_action: flag  -- keep rows, add <col>_invalid boolean column instead
#
# SCOPE: continuous/numeric features only.
# Categorical features (e.g. chest pain type, resting ECG, fasting blood sugar,
# exercise angina, ST slope, thalassemia, cholesterol/glucose ordinal codes in
# cardio70k) are intentionally excluded. Their valid values are enforced by the
# schema harmonization stage (load_data.py / loaders.py), not here. Adding range
# checks on ordinal codes would be redundant and fragile across dataset encodings.
clinical_constraints:
  default_action: drop

  age:
    min: 1          # 0 or negative is impossible; already normalised to years
    max: 120
    allow_null: false
    allow_zero: false

  resting_blood_pressure:
    min: 40         # below 40 mmHg = haemorrhagic shock / recording error
    max: 250        # above 250 = severe hypertensive crisis; likely data entry error
    allow_null: false
    allow_zero: false
    note: "Maps to: trestbps (cleveland), RestingBP (kaggle_heart), ap_hi (cardio70k)"

  diastolic_blood_pressure:
    min: 30
    max: 200
    allow_null: false
    allow_zero: false
    note: "Maps to: ap_lo (cardio70k only)"

  serum_cholesterol:
    min: 100        # <100 mg/dL possible but extremely rare in practice; treat as suspect
    max: 600        # >600 consistent with familial hypercholesterolaemia
    allow_null: false
    allow_zero: false   # 0 mg/dL = missing data encoded as zero; 172 rows in kaggle_heart
    note: "Maps to: chol (cleveland), Cholesterol (kaggle_heart). cardio70k uses categorical 1/2/3 -- not applied."

  max_heart_rate:
    min: 50         # below 50 bpm at peak exercise = extreme bradycardia / recording error
    max: 230        # theoretical human maximum; >220 almost always a recording error
    allow_null: false
    allow_zero: false
    note: "Maps to: thalach (cleveland), MaxHR (kaggle_heart)"

  st_depression:
    min: -5         # negative = ST elevation, still physiologically meaningful
    max: 10         # >10 mm is an extreme outlier / recording error
    allow_null: false
    allow_zero: true    # 0 mm = no depression, perfectly valid
    note: "Maps to: oldpeak (cleveland), Oldpeak (kaggle_heart)"

  height_cm:
    min: 100        # shortest recorded adult: 54.6 cm; 100 cm is a conservative bound
    max: 250        # tallest person recorded: 272 cm; 250 cm is a conservative upper bound
    allow_null: false
    allow_zero: false
    note: "Maps to: height (cardio70k only)"

  weight_kg:
    min: 30
    max: 300
    allow_null: false
    allow_zero: false
    note: "Maps to: weight (cardio70k only)"
