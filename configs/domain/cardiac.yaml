# Domain-specific configuration for cardiac disease datasets

dataset_info:
  name: "cardiac"
  description: "Cardiac disease prediction datasets"
  target_column: "heart_disease"
  target_type: "binary"
  positive_class: 1

datasets:
  cleveland:
    source: "UCI Heart Disease Cleveland"
    path: "data/raw/cardiac/cleveland_standardized.csv"
    n_samples: 297  # After preprocessing
    n_features: 13
    
  kaggle_heart:
    source: "Kaggle Heart Disease Dataset"
    path: "data/raw/cardiac/kaggle_heart_standardized.csv"
    n_samples: 918  # After preprocessing
    n_features: 11

  cardio70k:
    source: "Cardiovascular Disease Dataset (70k)"
    path: "data/raw/cardiac/cardio70k_standardized.csv"
    n_samples: 70000
    n_features: 12
    age_unit: "days"  # ages stored in days, not years

sensitive_attributes:
  age_group:
    type: "categorical"
    description: "Age group bins"
    categories: ["<40", "40-49", "50-59", "60-69", "70+"]
    
  sex:
    type: "binary"
    description: "Biological sex"
    categories: ["female", "male"]

  ethnicity:
    type: "categorical"
    description: "Ethnicity (optional, not present in current cardiac datasets)"

  group_cluster:
    type: "categorical"
    description: "Derived cluster/similarity group (optional)"

# Canonical ordered list used for stratification and reporting.
# Matches configs/pipelines/cardiac.yaml → fairness.sensitive_attributes.
sensitive_attribute_order:
  - age_group
  - sex
  - ethnicity
  - group_cluster

# ── Schema harmonization constants ────────────────────────────────────
# Upper-bound clipping applied during age normalization.
age_clipping:
  years_upper: 120        # human-range upper bound for age in years
  cardio70k_days_upper: 43830  # ~120 years in days

# Canonical sex-value mappings applied during schema harmonization.
# Used by schemas.py, loaders.py, and notebook_utils.
sex_mapping:
  numeric:
    0: "Female"
    1: "Male"
    2: "Male"         # some datasets encode 2 as Male
  string:
    "F": "Female"
    "Female": "Female"
    "0": "Female"
    "M": "Male"
    "Male": "Male"
    "1": "Male"
    "2": "Male"

feature_groups:
  demographic:
    - age
    - sex
    
  clinical_measurements:
    - trestbps  # resting blood pressure
    - chol      # serum cholesterol
    - thalach   # max heart rate
    - oldpeak   # ST depression
    
  diagnostic_tests:
    - fbs       # fasting blood sugar
    - restecg   # resting ECG results
    - exang     # exercise induced angina
    - slope     # slope of peak exercise ST segment
    - ca        # number of major vessels
    - thal      # thalassemia

fairness_context:
  protected_groups:
    - age_group
    - sex
  
  known_biases:
    - "Age groups 60+ are overrepresented in positive class"
    - "Males have higher disease prevalence in Cleveland dataset"
    - "Females underrepresented in both datasets (historical bias)"
  
  clinical_relevance:
    critical_metrics:
      - recall  # Minimize false negatives (missing actual disease)
      - calibration  # Probability estimates must be reliable
    
    acceptable_tradeoffs:
      precision: "Can tolerate some false positives for safety"
      specificity: "Secondary to sensitivity in healthcare context"
