# Combinatorial Experiment Configuration
# Tests all combinations of: dataset × binning × mitigation × training_method

# Datasets to test
datasets:
  - cleveland
  - kaggle_heart

# Age binning strategies
binning_strategies:
  - fixed_10yr
  - fixed_5yr
  - clinical
  - quantile_3
  - quantile_5

# Mitigation techniques
mitigation_techniques:
  - baseline
  - reweighting
  - smote
  - ros
  - rus
  - adasyn
  - exponentiated_gradient
  - grid_search
  - threshold_optimizer

# Training methods
training_methods:
  - single_split
  - kfold_cv

# Model families to compare.
# Note: mitigation techniques are currently executed only with logistic_regression.
model_types:
  - logistic_regression
  - random_forest
  - svm
  - xgboost

# Keep variants intentionally small for tractable runtime.
# Each variant merges onto model_params_by_type[model_type].
model_variants:
  logistic_regression:
    - name: c_1_0
      params:
        C: 1.0
    - name: c_0_5
      params:
        C: 0.5

  random_forest:
    - name: rf_shallow
      params:
        n_estimators: 250
        max_depth: 8
    - name: rf_deeper
      params:
        n_estimators: 350
        max_depth: 14

  svm:
    - name: svm_linear
      params:
        kernel: linear
        C: 1.0
    - name: svm_rbf
      params:
        kernel: rbf
        C: 1.0
        gamma: scale

  xgboost:
    - name: xgb_small
      params:
        n_estimators: 200
        max_depth: 4
        learning_rate: 0.05

# Cross-validation settings
cv_folds: 5
random_seed: 42

# Base model parameters by model type (kept intentionally compact)
model_params_by_type:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: balanced
    random_state: 42

  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 1
    class_weight: balanced_subsample
    n_jobs: -1
    random_state: 42

  svm:
    C: 1.0
    kernel: rbf
    gamma: scale
    class_weight: balanced
    probability: true
    random_state: 42

  xgboost:
    n_estimators: 250
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    n_jobs: -1
    random_state: 42
    eval_metric: logloss
    tree_method: hist

# Optional: override base estimator params for in-processing fairness methods
# (e.g., set solver/penalty for fairlearn GridSearch/ExponentiatedGradient)
# If empty or missing, defaults to model_params.
fairness_base_model_params: {}

# Sensitive / group attributes (evaluated if present in the dataset)
sensitive_attributes:
  - age_group
  - sex
  - ethnicity
  - group_cluster

# Fairness evaluation thresholds (for filtering results)
fairness_thresholds:
  min_improvement_pct: 10  # Minimum fairness improvement (%)
  max_performance_drop_pct: 15  # Maximum allowed performance drop (%)
  min_recall: 0.70  # Minimum clinical safety threshold

# XAI settings
xai:
  enabled: true
  mode: top_configs          # all | top_configs | disabled
  top_k: 3                   # interpreted per dataset when top_k_per_dataset=true
  top_k_per_dataset: true
  max_samples: 200
  top_max_samples: 120
  lime_instances: 2
  skip_shap_model_types: [svm]
  allow_svm_shap: false
  allow_svm_shap_on_top_configs: true

# Paths
paths:
  processed_dir: data/processed/cardiac
  results_dir: output/cardiac/experiments/full

# Parallel execution
enable_parallelization: true
n_jobs: -1  # -1 for all cores

# Total combinations: 2 datasets × 5 binning × 9 mitigation × 2 training = 180 experiments
