# Combinatorial Experiment Configuration
# Tests all combinations of: dataset × binning × mitigation × training_method

# Compute accelerator for XGBoost training.
# Options: auto | cpu | cuda
#   auto  — detects NVIDIA GPU via nvidia-smi at startup; falls back to cpu
#   cuda  — force GPU (requires NVIDIA GPU + CUDA drivers)
#   cpu   — force CPU (safe default for AMD/integrated/no-CUDA environments)
# Note: ROCm (AMD GPU) is not yet supported; AMD machines should use cpu.
accelerator: auto

# Datasets to test
# Note: cardio70k age is stored in days and is normalized to years during preprocessing.
# cardio70k is subsampled to 10k rows by default (--max-samples 10000 in preprocess_data.py)
# due to consumer hardware constraints (SVM RBF OOM on full 70k; ~6 min for LR-only sweep).
# Restore --max-samples or remove the default to run on full 70k (HPC recommended).
datasets:
  - cleveland
  - kaggle_heart
  - cardio70k

# Age binning strategies
binning_strategies:
  - fixed_10yr
  - fixed_5yr
  - clinical
  - quantile_3
  - quantile_5

# Mitigation techniques
# Justification for exclusions:
#   ros/rus: random resampling has no fairness guarantee and discards information;
#            methodologically weaker than SMOTE/ADASYN for clinical tabular data.
#            Excluded to keep the sweep tractable and focused on richer methods.
#
# NOTE on grid_search: this is fairlearn.GridSearchReduction (lambda sweep for
#   fairness-accuracy trade-off), NOT sklearn GridSearchCV for hyperparameter tuning.
#   Hyperparameter tuning is handled separately via model_variants below.
mitigation_techniques:
  - baseline
  - reweighting
  - smote
  - adasyn
  - exponentiated_gradient
  - grid_search          # fairlearn.GridSearchReduction — fairness in-processing
  - threshold_optimizer
  # Deferred: ros (random oversampling) — weaker than smote/adasyn, no fairness guarantee
  # Deferred: rus (random undersampling) — information loss, no fairness guarantee

# Deferred: pre + in-processing combos (e.g. smote + exponentiated_gradient).
# These are scientifically valid but add runtime and combinatorial complexity.
# Planned for a follow-up branch once single-method baselines are established.
# mitigation_combos:
#   - [smote, exponentiated_gradient]   # oversample → fairness-constrained training
#   - [adasyn, exponentiated_gradient]  # adaptive oversample → fairness-constrained training
#   - [smote, threshold_optimizer]      # oversample → post-hoc threshold calibration

# Training methods
training_methods:
  - single_split
  - kfold_cv

# Model families to compare.
# Note: mitigation techniques are only executed with logistic_regression (see MITIGATION_SUPPORTED_MODEL_TYPES).
# Other models run baseline-only experiments.
# Warning: SVM on cardio70k full 70k rows OOMs on consumer hardware (RBF kernel is O(n²)).
#          With --max-samples 10000, SVM linear is safe. For full 70k, exclude SVM or use HPC.
model_types:
  - logistic_regression
  - random_forest
  - svm
  - xgboost

# Keep variants intentionally small for tractable runtime.
# Each variant merges onto model_params_by_type[model_type].
model_variants:
  logistic_regression:
    - name: c_1_0
      params:
        C: 1.0
    - name: c_0_5
      params:
        C: 0.5

  random_forest:
    - name: rf_shallow
      params:
        n_estimators: 250
        max_depth: 8
    - name: rf_deeper
      params:
        n_estimators: 350
        max_depth: 14

  svm:
    - name: svm_linear
      params:
        kernel: linear
        C: 1.0
    # svm_rbf excluded for now: RBF kernel is O(n²) in training.
    # On cardio70k (70k rows) this would take hours. Re-enable only on
    # small datasets or with an explicit dataset-size guard in the runner.
    # - name: svm_rbf
    #   params:
    #     kernel: rbf
    #     C: 1.0
    #     gamma: scale

  xgboost:
    - name: xgb_small
      params:
        n_estimators: 200
        max_depth: 4
        learning_rate: 0.05

# Cross-validation settings
cv_folds: 5
random_seed: 42

# Base model parameters by model type (kept intentionally compact)
model_params_by_type:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: balanced
    random_state: 42

  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 1
    class_weight: balanced_subsample
    n_jobs: -1
    random_state: 42

  svm:
    C: 1.0
    kernel: rbf     # overridden by svm_linear variant; rbf fallback kept for safety
    gamma: scale
    class_weight: balanced
    probability: true
    random_state: 42

  xgboost:
    n_estimators: 250
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    n_jobs: -1
    random_state: 42
    eval_metric: logloss
    tree_method: hist   # algorithm; device is injected at runtime from accelerator setting

# Optional: override base estimator params for in-processing fairness methods
# (e.g., set solver/penalty for fairlearn GridSearch/ExponentiatedGradient)
# If empty or missing, defaults to model_params.
fairness_base_model_params: {}

# Sensitive / group attributes (evaluated if present in the dataset)
sensitive_attributes:
  - age_group
  - sex
  - ethnicity
  - group_cluster

# Fairness evaluation thresholds (for filtering results)
fairness_thresholds:
  min_improvement_pct: 10  # Minimum fairness improvement (%)
  max_performance_drop_pct: 15  # Maximum allowed performance drop (%)
  min_recall: 0.70  # Minimum clinical safety threshold

# XAI settings
xai:
  enabled: true
  mode: top_configs          # all | top_configs | disabled
  top_k: 3                   # interpreted per dataset when top_k_per_dataset=true
  top_k_per_dataset: true
  max_samples: 200
  top_max_samples: 120
  lime_instances: 2
  skip_shap_model_types: [svm]
  allow_svm_shap: false
  allow_svm_shap_on_top_configs: true

# Paths
paths:
  processed_dir: data/processed/cardiac
  results_dir: output/cardiac/experiments/full

# Parallel execution
enable_parallelization: true
n_jobs: 6  # 6 threads; i5-1135G7 has 8 logical cores, leave 2 for OS/other work

# Total combinations (2 datasets): 2 datasets × 5 binning × 7 mitigation × 2 training = 140 experiments (LR)
# Other models (RF/XGB/SVM-linear) run baseline only: 2 datasets × 5 binning × 1 × 2 = 20 each
# With cardio70k added (3rd dataset): +70 LR experiments + 30 multi-model baseline experiments
