# Baseline Logistic Regression Pipeline Configuration
# This config reproduces the current baseline experiment

data:
  dataset: "cardiac"
  datasets:
    - cleveland
    - kaggle_heart
  test_size: 0.3
  random_state: 42
  stratify:
    - heart_disease
    - age_group
    - sex

preprocessing:
  scaling: "standard"
  handle_missing: "drop"  # or "impute"
  binning:
    age:
      method: "fixed"
      bins: [0, 40, 50, 60, 70, 100]
      labels: ["<40", "40-49", "50-59", "60-69", "70+"]
  sensitive_attributes:
    - age_group
    - sex

model:
  type: "logistic_regression"
  hyperparameters:
    C: 1.0
    class_weight: "balanced"
    max_iter: 1000
    random_state: 42
    solver: "lbfgs"

fairness:
  metrics:
    - demographic_parity
    - equalized_odds
    - equal_opportunity
    - predictive_parity
    - calibration
  thresholds:
    demographic_parity: 0.1
    equalized_odds: 0.1
    calibration_ece: 0.05

output:
  base_dir: "output/cardiac/baseline/latest_run"
  save_model: true
  save_predictions: true
  save_fairness_report: true
