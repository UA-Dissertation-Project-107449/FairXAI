# Cardiac pipeline configuration (YAML)

paths:
  external_dir: data/external/cardiac
  raw_dir: data/raw/cardiac
  processed_dir: data/processed/cardiac

runtime:
  datasets: [cleveland]
  schema_mapping_json: configs/schema/cardiac.json

split:
  test_size: 0.3
  random_state: 42

training:
  model: logistic_regression   # default model for single-model runs
  model_types: [logistic_regression, random_forest, svm, xgboost]
  # Base hyperparameters for each model type live in configs/models/<type>.yaml.
  thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]
  # Feature selection mode (see src/fairxai/data/feature_selection.py).
  # exclude_sensitive = model-blind privacy baseline (standard deployment).
  # Override with --feature-selection-mode CLI flag for ablation studies.
  feature_selection_mode: exclude_sensitive

fairness:
  sensitive_attributes: [age_group, sex, ethnicity, group_cluster]

xai:
  enabled: true
  cv_enabled: true
  lime_instances: 3
  cv_lime_instances: 3
  global_max_samples: 1000
  skip_shap_model_types: [svm]
