# Cardiac pipeline configuration (YAML)

paths:
  external_dir: data/external/cardiac
  raw_dir: data/raw/cardiac
  processed_dir: data/processed/cardiac
  experiments_dir: output/cardiac/baseline/latest_run/results
  models_dir: output/cardiac/baseline/latest_run/models
  results_fairness_dir: output/cardiac/baseline/latest_run/fairness
  results_binning_dir: output/cardiac/experiments/full/latest_run/binning

runtime:
  datasets: [cleveland, kaggle_heart]
  schema_mapping_json: configs/schema/cardiac.json

split:
  test_size: 0.3
  random_state: 42

training:
  model: logistic_regression
  solver: lbfgs
  C: 1.0
  max_iter: 1000
  thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]

fairness:
  sensitive_attributes: [age_group, sex, ethnicity, group_cluster]

xai:
  enabled: true
  cv_enabled: true
  lime_instances: 3
  cv_lime_instances: 3
  global_max_samples: 1000
