# Cardiac pipeline configuration (YAML)

paths:
  external_dir: data/external/cardiac
  raw_dir: data/raw/cardiac
  processed_dir: data/processed/cardiac

runtime:
  datasets: [cleveland, kaggle_heart]
  # Canonical processed layout: data/processed/cardiac/{dataset}_{default_binning}/.
  # Loaders (train, mitigation, hpo) fall back to data/processed/cardiac/{dataset}/
  # when the binning subdir is absent (no-binning preprocess runs).
  default_binning: fixed_10yr
  schema_mapping_json: configs/schema/cardiac.json

split:
  test_size: 0.3
  random_state: 42

training:
  model: logistic_regression   # default model for single-model runs
  model_types: [logistic_regression, random_forest, svm, xgboost]
  training_methods: [single_split, kfold_cv]
  # Base hyperparameters for each model type live in configs/models/<type>.yaml.
  thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]
  # Feature selection mode (see src/fairxai/data/feature_selection.py).
  # exclude_sensitive = model-blind privacy baseline (standard deployment).
  # Override with --feature-selection-mode CLI flag for ablation studies.
  feature_selection_mode: exclude_sensitive
  rfe_top_k: 10
  use_hpo: false
  cv_n_jobs: 1

fairness:
  sensitive_attributes: [age_group, sex, ethnicity, group_cluster]

# Optional: discover patient subgroups via clustering BEFORE training and treat
# them as a sensitive attribute (group_cluster). Off by default → pipeline is
# byte-for-byte the current behavior. Enable via this flag or env RUN_GROUPING=1.
# Clustering is fit on the TRAIN split only (leakage guard); test rows are
# assigned by nearest centroid. See docs/analysis/GROUPING_INTO_TRAINING.md.
grouping:
  enabled: false
  cluster_on: train_only
  methods: [kmeans, hierarchical, dbscan, gaussian_mixture]
  # Validity gate: every method runs, but a solution is rejected if it has fewer
  # than min_clusters or any cluster below the min size. Disqualifies the whole
  # degenerate solution (e.g. lopsided DBSCAN: 88% in one cluster + tiny rest) so
  # a balanced method wins; if none qualify, group_cluster is simply not injected.
  # Effective min size = max(min_cluster_size_abs, ceil(frac * n_train)):
  # cleveland (~240) keeps 20; larger datasets scale up by 5%.
  min_clusters: 2
  min_cluster_size_abs: 20
  min_cluster_size_frac: 0.05

# Post-assess similarity analysis (individual fairness). Analysis-only — needs
# predictions, never affects training. Off by default → enable via this flag or
# env RUN_SIMILARITY=1. Per model: scaled k-NN consistency + per-sensitive-group
# breakdown + violation-density map under <run>/baseline/individual_fairness/.
similarity:
  enabled: false
  k: [5, 10, 20]

xai:
  enabled: true
  cv_enabled: true
  lime_instances: 3
  cv_lime_instances: 3
  global_max_samples: 1000
  skip_shap_model_types: [svm]

studies:
  skip: false

scheduling:
  mode: auto_safe
  max_cores: null
  cpu_fraction: 0.75
  parallel_studies: true
  parallel_experiments: false
  fs_jobs: 1
  hpo_search_n_jobs: null
  hpo_model_n_jobs: null
  warn_rows_threshold: 50000
  max_memory_fraction: 0.80
