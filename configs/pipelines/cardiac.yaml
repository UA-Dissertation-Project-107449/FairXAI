# Cardiac pipeline configuration (YAML)

paths:
  external_dir: data/external/cardiac
  raw_dir: data/raw/cardiac
  processed_dir: data/processed/cardiac
  experiments_dir: output/cardiac/baseline/latest_run/results
  models_dir: output/cardiac/baseline/latest_run/models
  results_fairness_dir: output/cardiac/baseline/latest_run/fairness
  results_binning_dir: output/cardiac/experiments/full/latest_run/binning

runtime:
  datasets: [cleveland, kaggle_heart]
  schema_mapping_json: configs/schema/cardiac.json

split:
  test_size: 0.3
  random_state: 42

training:
  model: logistic_regression
  model_types: [logistic_regression, random_forest, svm, xgboost]
  C: 1.0
  max_iter: 1000
  class_weight: balanced
  model_params_by_type:
    logistic_regression:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      solver: lbfgs
    random_forest:
      n_estimators: 300
      max_depth: null
      min_samples_leaf: 1
      class_weight: balanced_subsample
      n_jobs: -1
    svm:
      C: 1.0
      kernel: rbf
      gamma: scale
      class_weight: balanced
      probability: true
    xgboost:
      n_estimators: 250
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.9
      colsample_bytree: 0.9
      reg_lambda: 1.0
      n_jobs: -1
      eval_metric: logloss
      tree_method: hist
  thresholds: [0.3, 0.4, 0.5, 0.6, 0.7]

fairness:
  sensitive_attributes: [age_group, sex, ethnicity, group_cluster]

xai:
  enabled: true
  cv_enabled: true
  lime_instances: 3
  cv_lime_instances: 3
  global_max_samples: 1000
  skip_shap_model_types: [svm]
