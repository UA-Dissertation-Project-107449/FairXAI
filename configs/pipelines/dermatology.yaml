# Dermatology pipeline configuration (PAD-UFES baseline)

paths:
  external_dir: data/external/dermatology
  raw_dir: data/raw/dermatology
  processed_dir: data/processed/dermatology

runtime:
  datasets: [pad_ufes_20]
  schema_mapping_json: configs/schema/dermatology.json

split:
  test_size: 0.3
  random_state: 42
  group_column: patient_id

training:
  modality: image
  target: skin_cancer
  model: resnet18
  model_types: [resnet18, mobilenet_v3_large, efficientnet_b0]
  training_methods: [single_split]
  thresholds: [0.5]
  use_hpo: false
  image:
    image_column: image_path
    device: auto      # auto probes cuda -> rocm -> cpu
    epochs: 5
    batch_size: 32
    learning_rate: 0.0003
    image_size: 224
    pretrained: true
    freeze_backbone: true
    num_workers: 6
    # Frozen-backbone speedup: extract features once, train only the head over them.
    # ON by default for frozen baselines; standard path used automatically when backbone unfrozen
    cache_frozen_features: true

profiling:
  # Stage 2 (profile): extra sensitive attributes profiled where present but kept
  # out of fairness.sensitive_attributes (PAD has no race; SCIN does). SCIN is
  # profiling-only, so race fairness here = data-fairness (support / missingness /
  # prevalence over the approximate skin_cancer proxy), not prediction fairness.
  extra_sensitive_attributes: [race_group]

fairness:
  sensitive_attributes: [age_group, sex, fitzpatrick_group]
  # Stage 8 (assess): groups with fewer than this many test rows are dropped from
  # group-fairness metrics and reported under skipped_groups (avoids claims on
  # tiny cells, e.g. PAD Fitzpatrick V-VI). Override per run with --min-group-samples.
  min_group_samples: 50
  group_views:
    # Stage 8 add-on: recompute fairness over post-hoc subgroup definitions from
    # saved prediction CSVs. No retraining; canonical fairness_report.json is unchanged.
    enabled: true
    min_group_samples: 50
    intersection_min_group_samples: 30
    views: [age_coarse, sex, fitzpatrick_group, sex_x_fitzpatrick, age_coarse_x_fitzpatrick]

readiness_figures:
  # Stage 4 (preprocess): render dissertation-ready data-validity figures from the
  # split-aware data-fairness profile. Override per run with --figures / --no-figures.
  enabled: true
  split: test
  outputs: [subgroup_support, target_prevalence]

comparison:
  # Stage 9 (compare): render dissertation-ready PNGs from existing baseline
  # metrics/fairness outputs. Override per run with --figures / --no-figures.
  figures: true

xai:
  # Stage 10 (explain): post-hoc saliency for trained CNNs. Reloads each model
  # checkpoint and writes SHAP / LIME / Grad-CAM overlays for a small set of test
  # images stratified by sensitive group x outcome (TP/FP/TN/FN). No retraining.
  enabled: true
  cv_enabled: false
  # Per-method toggles (all on to start; flip individually if LIME/SHAP are slow).
  shap: true
  lime: true
  gradcam: true
  n_samples: 12          # images explained per model
  per_cell: 1            # images per (sensitive group, outcome) stratum before budget
  lime_num_samples: 1000 # LIME perturbations per image (lower = faster, noisier)

mitigation:
  # Stage 11 (mitigate): post-processing only. Group-wise decision thresholds via
  # fairlearn ThresholdOptimizer, fit on saved train predictions and applied to
  # test predictions. Per sensitive attribute in isolation, every constraint
  # reported side-by-side. No retraining; no model load. CNN pre/in-processing
  # mitigation is deliberately out of scope (would require retraining) — see
  # docs/DECISIONS.md.
  enabled: true
  objective: balanced_accuracy_score
  min_group_samples: 50
  # Defaults to fairness.sensitive_attributes when omitted.
  sensitive_attributes: [age_group, sex, fitzpatrick_group]
  constraints:
    - demographic_parity
    - equalized_odds
    - true_positive_rate_parity
    - false_positive_rate_parity

studies:
  skip: true

scheduling:
  mode: serial
