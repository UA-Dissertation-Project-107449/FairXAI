# Complexity metric tunables for the profiling module.
#
# These defaults match the original hardcoded values so that existing
# results are reproducible.  Override per-pipeline by passing an
# explicit config dict to ``compute_complexity_metrics``.

# Maximum samples used by sampling-based metrics (N2, N3, N4, Raug, L3).
max_samples: 1000

# T1 structural-overlap uses a tighter budget because its O(n²)
# pair-wise pruning step is expensive.
t1_max_samples: 600

# Neighbourhood size for the Raug overlap metric.
raug_k: 5

# Global random seed used by every metric that subsamples or
# generates synthetic interpolations.
random_seed: 42

# Logistic-regression hyper-parameters used by L1, L2, and L3.
logistic_regression:
  solver: "liblinear"
  max_iter: 1000

# Default binary-classification target column expected in the input
# DataFrame when no explicit ``target`` argument is passed.
default_target: "heart_disease"
