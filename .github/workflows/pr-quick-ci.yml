name: PR Quick CI

on:
  pull_request:
    branches: [main]
    paths:
      - pyproject.toml
      - requirements.txt
      - src/**
      - scripts/**
      - tests/**
      - flows/**
      - configs/**
      - .github/workflows/**
  workflow_dispatch:

concurrency:
  group: pr-quick-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Lint tools only — no package install. black/isort/ruff do not import
      # fairxai, so the heavy experiment profile is not needed here.
      - name: Install lint tools
        run: python3 -m pip install black isort ruff

      - name: Black format check
        run: black --check src scripts tests flows

      - name: isort check
        run: isort --check-only src scripts tests flows

      - name: Ruff lint check
        run: ruff check src scripts tests flows

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install package (experiment profile)
        run: python3 -m pip install -e ".[experiment]"

      - name: Install test tooling
        run: python3 -m pip install pytest matplotlib seaborn jenkspy prefect tabulate

      - name: CLI help smoke check
        run: python3 -m fairxai.cli.characterize --help

      - name: Unit tests (skip viz smoke in PR quick CI)
        run: pytest tests/unit/ -q --ignore=tests/unit/test_viz_smoke.py

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Upgrade pip
        run: python3 -m pip install --upgrade pip

      - name: Install build tool
        run: python3 -m pip install build

      - name: Build wheel and sdist
        run: python3 -m build
